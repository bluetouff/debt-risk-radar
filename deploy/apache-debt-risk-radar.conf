<VirtualHost *:443>
    ServerName debt.l0g.fr

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/debt.l0g.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/debt.l0g.fr/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass "/_stcore/stream" "ws://127.0.0.1:8502/_stcore/stream"
    ProxyPassReverse "/_stcore/stream" "ws://127.0.0.1:8502/_stcore/stream"
    ProxyPass "/" "http://127.0.0.1:8502/"
    ProxyPassReverse "/" "http://127.0.0.1:8502/"

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer"
    Header always set X-Frame-Options "DENY"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-site"
    Header always set Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; upgrade-insecure-requests"

    ErrorLog ${APACHE_LOG_DIR}/debt-risk-radar-error.log
    CustomLog ${APACHE_LOG_DIR}/debt-risk-radar-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName debt.l0g.fr
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>
